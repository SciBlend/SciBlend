schema_version = "1.0.0"

id = "sciblend"
version = "1.2.0"
name = "SciBlend"
tagline = "Scientific visualization tools for Blender"
maintainer = "José Marín<info@sciblend.com>"
type = "add-on"
website = "https://github.com/SciBlend/SciBlend"
platforms = [
	"windows-x64",
	"linux-x64",
	"macos-arm64",
]
tags = [
  	"Import-Export"
]
blender_version_min = "5.1.0"
license = [
  "SPDX:GPL-3.0-or-later"
]
copyright =[
	"2024-2025 José Marín",
]


